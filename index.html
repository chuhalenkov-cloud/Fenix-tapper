      <div class="ref-link" id="refLink">fenix.app/ref/USER123456</div>
      <button class="copy-btn" onclick="copyRef()">📋 Скопировать ссылку</button>
    </div>
    <div class="ref-bonus">
      <div><div class="ref-bonus-label">Приглашено друзей</div><div class="ref-bonus-value" id="refCount">0</div></div>
      <div style="text-align:right"><div class="ref-bonus-label">Заработано бонусов</div><div class="ref-bonus-value" id="refBonus">0</div></div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('tap',this)"><span class="nav-icon">🐦‍🔥</span><span class="nav-label">Тапать</span></div>
    <div class="nav-item" onclick="switchPage('upgrades',this)"><span class="nav-icon">⚡</span><span class="nav-label">Апгрейды</span></div>
    <div class="nav-item" onclick="switchPage('boost',this)"><span class="nav-icon">💎</span><span class="nav-label">Буст</span></div>
    <div class="nav-item" onclick="switchPage('leaders',this)"><span class="nav-icon">🏆</span><span class="nav-label">Топ</span></div>
    <div class="nav-item" onclick="switchPage('ref',this)"><span class="nav-icon">👥</span><span class="nav-label">Рефералы</span></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let state={coins:0,energy:1000,maxEnergy:1000,tapPower:1,passivePerSec:0,level:0,upgrades:{},refs:0,refBonus:0};
const LEVELS=[{name:'🐣 Птенец',threshold:0},{name:'🐦 Птица',threshold:10000},{name:'🔥 Огненная',threshold:50000},{name:'🐦‍🔥 Феникс',threshold:200000},{name:'⚡ Легенда',threshold:1000000}];
const UPGRADES=[{id:'wings1',icon:'🪶',name:'Крылья I',desc:'+2 за тап',cost:1000,tapBonus:1,energyBonus:0,passiveBonus:0},{id:'wings2',icon:'🦅',name:'Крылья II',desc:'+5 за тап',cost:10000,tapBonus:3,energyBonus:0,passiveBonus:0},{id:'wings3',icon:'🔥',name:'Огненные крылья',desc:'+10 за тап',cost:50000,tapBonus:5,energyBonus:0,passiveBonus:0},{id:'energy1',icon:'⚡',name:'Огонь I',desc:'+500 макс. энергии',cost:5000,tapBonus:0,energyBonus:500,passiveBonus:0},{id:'energy2',icon:'🌋',name:'Огонь II',desc:'+1000 макс. энергии',cost:25000,tapBonus:0,energyBonus:1000,passiveBonus:0},{id:'auto1',icon:'🤖',name:'Автотап I',desc:'+1 монета/сек',cost:100000,tapBonus:0,energyBonus:0,passiveBonus:1},{id:'auto2',icon:'⚙️',name:'Автотап II',desc:'+5 монет/сек',cost:500000,tapBonus:0,energyBonus:0,passiveBonus:5}];
const LEADERBOARD=[{name:'CryptoKing',score:8420000},{name:'FireBird99',score:6100000},{name:'MoonHunter',score:4800000},{name:'FenixWhale',score:3200000},{name:'BlockChainer',score:2900000},{name:'DeFiMaster',score:1750000},{name:'CoinFliper',score:1200000},{name:'You',score:0,isYou:true},{name:'HODLer2025',score:0},{name:'SatoshiFan',score:0}];
function formatNum(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return Math.floor(n).toString();}
function updateUI(){
  document.getElementById('coinAmount').textContent=formatNum(state.coins);
  document.getElementById('perTap').textContent='+'+state.tapPower;
  document.getElementById('perSec').textContent=state.passivePerSec;
  document.getElementById('energyVal').textContent=Math.floor(state.energy)+' / '+state.maxEnergy;
  document.getElementById('energyFill').style.width=(state.energy/state.maxEnergy*100)+'%';
  const lvl=getCurrentLevel();state.level=lvl;
  const ld=LEVELS[lvl],nd=LEVELS[lvl+1];
  document.getElementById('levelBadge').textContent=ld.name;
  document.getElementById('currentLevelName').textContent=ld.name;
  if(nd){const prev=LEVELS[lvl].threshold,prog=(state.coins-prev)/(nd.threshold-prev)*100;document.getElementById('levelFill').style.width=Math.min(prog,100)+'%';document.getElementById('nextLevelInfo').textContent='до '+nd.name+': '+formatNum(nd.threshold-state.coins);}
  else{document.getElementById('levelFill').style.width='100%';document.getElementById('nextLevelInfo').textContent='Максимальный уровень! 🔥';}
  LEADERBOARD.find(l=>l.isYou).score=state.coins;
  renderLeaderboard();renderUpgrades();
}
function getCurrentLevel(){for(let i=LEVELS.length-1;i>=0;i--){if(state.coins>=LEVELS[i].threshold)return i;}return 0;}
document.getElementById('tapBtn').addEventListener('click',function(e){
  if(state.energy<1){showToast('⚡ Нет энергии! Подожди...');return;}
  state.coins+=state.tapPower;state.energy=Math.max(0,state.energy-1);
  const area=document.getElementById('tapArea'),rect=area.getBoundingClientRect();
  const ft=document.createElement('div');ft.className='float-text';ft.textContent='+'+state.tapPower;
  ft.style.left=(e.clientX-rect.left-15)+'px';ft.style.top=(e.clientY-rect.top-20)+'px';
  area.appendChild(ft);setTimeout(()=>ft.remove(),900);updateUI();
});
setInterval(()=>{if(state.energy<state.maxEnergy){state.energy=Math.min(state.maxEnergy,state.energy+0.33);updateUI();}},1000);
setInterval(()=>{if(state.passivePerSec>0){state.coins+=state.passivePerSec;updateUI();}},1000);
function renderUpgrades(){
  const list=document.getElementById('upgradesList');list.innerHTML='';
  UPGRADES.forEach(u=>{const bought=state.upgrades[u.id],canAfford=state.coins>=u.cost&&!bought;
  const div=document.createElement('div');div.className='upgrade-card'+(bought?' purchased':'')+(canAfford?' can-afford':'');
  div.innerHTML=`<div class="upgrade-icon">${u.icon}</div><div class="upgrade-info"><div class="upgrade-name">${u.name}</div><div class="upgrade-desc">${u.desc}</div></div><div class="upgrade-cost ${bought?'purchased':''}">${bought?'✅ Куплено':formatNum(u.cost)+' 🔥'}</div>`;
  if(!bought)div.onclick=()=>buyUpgrade(u);list.appendChild(div);});
}
function buyUpgrade(u){if(state.coins<u.cost){showToast('❌ Недостаточно монет');return;}if(state.upgrades[u.id])return;state.coins-=u.cost;state.upgrades[u.id]=true;state.tapPower+=u.tapBonus;state.maxEnergy+=u.energyBonus;state.passivePerSec+=u.passiveBonus;showToast('✅ '+u.name+' куплено!');updateUI();}
function renderLeaderboard(){
  const sorted=[...LEADERBOARD].sort((a,b)=>b.score-a.score);
  const list=document.getElementById('leaderboardList');list.innerHTML='';
  sorted.forEach((p,i)=>{const rank=i+1,rc=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
  const row=document.createElement('div');row.className='leader-row'+(p.isYou?' you':'');
  row.innerHTML=`<div class="leader-rank ${rc}">#${rank}</div><div class="leader-name">${p.isYou?'👤 '+p.name+' (ты)':p.name}</div><div class="leader-score">${formatNum(p.score)} 🔥</div>`;
  list.appendChild(row);});
}
function buyBoost(type){const prices={starter:5,silver:20,gold:50,diamond:200,phoenix:1000};showToast(`💎 Отправь $${prices[type]} USDT → @fenixtoken_bot`);}
function copyRef(){navigator.clipboard.writeText('https://fenix.app/ref/USER123456').catch(()=>{});showToast('📋 Ссылка скопирована!');}
function switchPage(page,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('page-'+page).classList.add('active');el.classList.add('active');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
renderUpgrades();renderLeaderboard();updateUI();
</script>
</body>
</html>
